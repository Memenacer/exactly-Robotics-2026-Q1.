let currentIndex = 0;
let isPlaying = false;
let isShuffle = false;
let isRepeatOne = false;

const audio = document.getElementById('main-audio');
const playBtn = document.getElementById('play-btn');
const albumArt = document.getElementById('album-art');
const trackTitle = document.getElementById('track-title');
const trackArtist = document.getElementById('track-artist');
const playlistList = document.getElementById('playlist-list');

// --- FUNCTIONS TO IMPLEMENT ---

function renderPlaylist() {
    playlistList.innerHTML = "";
    songs.forEach((song, index) => {
        const li = document.createElement('li');
        
        // --- STYLING (DON'T CHANGE THIS) ---
        li.innerHTML = `<div style="font-size: 0.85rem; font-weight: bold;">${song.title}</div>
                        <div style="font-size: 0.7rem; color: #b3b3b3;">${song.artist}</div>`;
        li.style.padding = "10px";
        li.style.borderBottom = "1px solid #333";
        li.style.cursor = "pointer";
        li.setAttribute('id', `track-${index}`);
        // ------------------------------------

li.onclick = () => {
      currentIndex = index;
      loadTrack(index);
      playTrack();
    };

        
        playlistList.appendChild(li);
    });
}

function loadTrack(index) {
    // TODO: ADD CHOICE FOR LOADING TRACK HERE
    const song = songs[index];
audio.src = fixDropboxUrl(song.url);
albumArt.src = song.cover;
trackTitle.innerText = song.title;
trackArtist.innerText = song.artist;

    // Highlight active track (Leave this code alone)
    songs.forEach((_, i) => {
        const item = document.getElementById(`track-${i}`);
        if (item) {
            item.style.background = (i === index) ? "#3e3e3e" : "transparent";
            item.style.color = (i === index) ? "#1DB954" : "white";
        }
    });
}

function playTrack() {
    // TODO: ADD CHOICE FOR PLAYING TRACK HERE
    audio.play();
isPlaying = true;
playBtn.innerText = "⏸";

}

function togglePlay() {
if (isPlaying) {
  audio.pause();
  playBtn.innerText = "▶";
} else {
  playTrack();
  playBtn.innerText = "⏸";
}
isPlaying = !isPlaying;

}

function nextTrack() {
   if (isShuffle) {
  currentIndex = Math.floor(Math.random() * songs.length);
} else {
  currentIndex = (currentIndex + 1) % songs.length;
}
loadTrack(currentIndex);
if (isPlaying) playTrack();

}

function prevTrack() {
currentIndex = (currentIndex - 1 + songs.length) % songs.length;
loadTrack(currentIndex);
if (isPlaying) playTrack();

}

function toggleShuffle() {
isShuffle = !isShuffle;
const shuffleBtn = document.getElementById('shuffle-btn');
shuffleBtn.style.color = isShuffle ? "#1DB954" : "gray";
shuffleBtn.innerText = isShuffle ? "🔀" : "⮕";

}

function toggleRepeat() {
isRepeatOne = !isRepeatOne;
const btn = document.getElementById('repeat-btn');
btn.innerText = isRepeatOne ? "🔂" : "🔁";
btn.style.color = isRepeatOne ? "#1DB954" : "gray";

}

audio.onended = () => {
if (isRepeatOne) {
  playTrack();
} else {
  nextTrack();
}

};

// Start
renderPlaylist();
loadTrack(currentIndex);
